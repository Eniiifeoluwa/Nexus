version: "3.9"

services:
  agent-system:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: autonomous-agent-system:latest
    container_name: amas-api
    ports:
      - "8000:8000"   # FastAPI
      - "9090:9090"   # Prometheus metrics
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL_PRIMARY=${GROQ_MODEL_PRIMARY:-llama3-70b-8192}
      - GROQ_MODEL_FAST=${GROQ_MODEL_FAST:-mixtral-8x7b-32768}
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - USE_DOCKER=false
      - PYTHONPATH=/app
    volumes:
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
      - ./chroma_db:/app/chroma_db
      - /var/run/docker.sock:/var/run/docker.sock  # for Docker sandbox
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Optional: Prometheus for metrics scraping
  prometheus:
    image: prom/prometheus:latest
    container_name: amas-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - agent-system
    profiles:
      - monitoring

volumes:
  chroma_data:
  artifacts_data:
  logs_data:
