<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Autonomous Agent System — Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --primary: #58a6ff; --success: #3fb950; --warn: #d29922;
    --danger: #f85149; --text: #c9d1d9; --muted: #8b949e;
    --code-bg: #1f2428;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1.2rem; font-weight: 600; color: var(--primary); }
  .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; background: #238636; color: #fff; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 32px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .card h3 { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .card .value { font-size: 2rem; font-weight: 700; color: var(--primary); }
  .card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

  .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 14px; color: var(--text); }

  textarea { width: 100%; background: var(--code-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 0.9rem; resize: vertical; font-family: inherit; }
  button { background: var(--primary); color: #0d1117; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: opacity .15s; }
  button:hover { opacity: .85; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

  .status-pill { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
  .pill-running { background: #1c3a6e; color: var(--primary); }
  .pill-complete { background: #1a3a2a; color: var(--success); }
  .pill-failed { background: #3a1a1a; color: var(--danger); }
  .pill-awaiting_human { background: #3a2e10; color: var(--warn); }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; padding: 8px 12px; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:hover td { background: rgba(255,255,255,.03); }

  .progress-bar { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width .4s; }

  .steps { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .step { display: flex; align-items: center; gap: 10px; font-size: 0.82rem; }
  .step-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-done { background: var(--success); }
  .dot-active { background: var(--primary); animation: pulse 1s infinite; }
  .dot-pending { background: var(--border); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

  pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; overflow-x: auto; font-size: 0.8rem; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }

  .empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem; }
  .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.85rem; }
  .alert-warn { background: #2a2010; border: 1px solid var(--warn); color: var(--warn); }
  .alert-success { background: #102a15; border: 1px solid var(--success); color: var(--success); }
  .alert-error { background: #2a1010; border: 1px solid var(--danger); color: var(--danger); }

  #taskDetail { display: none; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: -1px; }
  .tab { padding: 8px 16px; cursor: pointer; font-size: 0.85rem; border-radius: 8px 8px 0 0; color: var(--muted); border: 1px solid transparent; }
  .tab.active { color: var(--text); background: var(--surface); border-color: var(--border); border-bottom-color: var(--surface); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }
</style>
</head>
<body>
<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2">
    <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
  </svg>
  <h1>Autonomous Multi-Agent System</h1>
  <span class="badge">v1.0</span>
  <span id="healthBadge" style="margin-left:auto; font-size:0.8rem; color:var(--muted)">● connecting…</span>
</header>

<div class="container">

  <!-- Metric cards -->
  <div class="grid-4">
    <div class="card"><h3>Total Tasks</h3><div class="value" id="mTotal">—</div></div>
    <div class="card"><h3>Success Rate</h3><div class="value" id="mSuccess">—</div></div>
    <div class="card"><h3>Avg Latency</h3><div class="value" id="mLatency">—</div><div class="sub">seconds</div></div>
    <div class="card"><h3>Total Tokens</h3><div class="value" id="mTokens">—</div></div>
  </div>

  <div class="grid-2">
    <!-- Submit task -->
    <div class="card">
      <p class="section-title">Submit New Task</p>
      <div id="submitAlert"></div>
      <textarea id="taskInput" rows="4" placeholder="e.g. Analyse global renewable energy trends, generate visualisations, and produce a comprehensive report with code."></textarea>
      <div style="margin-top:12px; display:flex; gap:8px;">
        <button id="submitBtn" onclick="submitTask()">▶ Run Task</button>
        <button onclick="loadExample()" style="background:var(--surface); color:var(--text); border:1px solid var(--border);">Load Example</button>
      </div>
    </div>

    <!-- Active task monitor -->
    <div class="card">
      <p class="section-title">Active Task Monitor</p>
      <div id="monitorArea">
        <div class="empty-state">No active task. Submit one →</div>
      </div>
    </div>
  </div>

  <!-- Task list -->
  <div class="card" style="margin-bottom:24px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <p class="section-title" style="margin:0">All Tasks</p>
      <button class="btn-sm" onclick="loadTasks()" style="background:var(--surface); border:1px solid var(--border); color:var(--text)">↻ Refresh</button>
    </div>
    <div id="taskTable"><div class="empty-state">No tasks yet.</div></div>
  </div>

  <!-- Task detail -->
  <div class="card" id="taskDetail">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <p class="section-title" style="margin:0">Task Detail — <span id="detailId" style="color:var(--muted); font-size:0.85rem;"></span></p>
      <button class="btn-sm" onclick="document.getElementById('taskDetail').style.display='none'" style="background:var(--surface); border:1px solid var(--border); color:var(--text)">✕ Close</button>
    </div>

    <div id="humanAlert"></div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('report')">Report</div>
      <div class="tab" onclick="switchTab('code')">Code</div>
      <div class="tab" onclick="switchTab('metrics')">Metrics</div>
      <div class="tab" onclick="switchTab('artifacts')">Artifacts</div>
    </div>

    <div id="tab-report" class="tab-pane active"><pre id="reportContent">—</pre></div>
    <div id="tab-code" class="tab-pane"><pre id="codeContent">—</pre></div>
    <div id="tab-metrics" class="tab-pane"><pre id="metricsContent">—</pre></div>
    <div id="tab-artifacts" class="tab-pane"><div id="artifactsContent"></div></div>
  </div>

</div>

<script>
const API = '';  // same origin; change to http://localhost:8000 if separate

let activeTaskId = null;
let pollTimer = null;

const AGENT_STEPS = ['PlannerAgent','ResearchAgent','CoderAgent','ExecutorAgent','CriticAgent','ReporterAgent'];

async function api(path, opts={}) {
  const r = await fetch(API + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function checkHealth() {
  try {
    const h = await api('/health');
    document.getElementById('healthBadge').innerHTML = `<span style="color:var(--success)">● healthy</span> &nbsp; active: ${h.active_tasks}`;
  } catch { document.getElementById('healthBadge').innerHTML = '<span style="color:var(--danger)">● offline</span>'; }
}

async function loadMetrics() {
  try {
    const m = await api('/metrics');
    document.getElementById('mTotal').textContent = m.total_tasks;
    document.getElementById('mSuccess').textContent = (m.task_success_rate*100).toFixed(0)+'%';
    document.getElementById('mLatency').textContent = m.avg_latency_s.toFixed(1);
    document.getElementById('mTokens').textContent = m.total_tokens_used.toLocaleString();
  } catch {}
}

async function loadTasks() {
  try {
    const { tasks } = await api('/tasks');
    const el = document.getElementById('taskTable');
    if (!tasks.length) { el.innerHTML = '<div class="empty-state">No tasks yet.</div>'; return; }
    el.innerHTML = `<table>
      <thead><tr><th>Task ID</th><th>Status</th><th>Task</th><th>Subtasks</th><th>Retries</th><th>Actions</th></tr></thead>
      <tbody>${tasks.map(t => `
        <tr>
          <td style="font-family:monospace;font-size:0.75rem">${t.task_id.slice(0,8)}…</td>
          <td><span class="status-pill pill-${t.status}">${t.status}</span></td>
          <td title="${t.task}">${t.task}</td>
          <td>${t.subtasks}</td>
          <td>${t.retries}</td>
          <td><button class="btn-sm" onclick="viewTask('${t.task_id}')">View</button></td>
        </tr>`).join('')}
      </tbody></table>`;
  } catch {}
}

async function submitTask() {
  const task = document.getElementById('taskInput').value.trim();
  if (!task) return;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  const alertEl = document.getElementById('submitAlert');
  try {
    const res = await api('/task', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({task})
    });
    alertEl.innerHTML = `<div class="alert alert-success">✔ Task submitted — ID: <strong>${res.task_id}</strong></div>`;
    activeTaskId = res.task_id;
    startPolling(res.task_id);
    loadTasks();
  } catch(e) {
    alertEl.innerHTML = `<div class="alert alert-error">✗ ${e.message}</div>`;
  } finally { btn.disabled = false; }
}

function startPolling(taskId) {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => pollStatus(taskId), 2500);
  pollStatus(taskId);
}

async function pollStatus(taskId) {
  try {
    const s = await api(`/status/${taskId}`);
    renderMonitor(s);
    if (['complete','failed','awaiting_human'].includes(s.status)) {
      clearInterval(pollTimer);
      loadTasks();
      loadMetrics();
      if (s.status === 'complete') viewTask(taskId);
    }
  } catch {}
}

function renderMonitor(s) {
  const messages = (s.subtasks || []);
  const currentIdx = AGENT_STEPS.indexOf(s.current_step);
  const stepsHtml = AGENT_STEPS.map((step, i) => {
    const cls = i < currentIdx ? 'dot-done' : i === currentIdx ? 'dot-active' : 'dot-pending';
    return `<div class="step"><div class="step-dot ${cls}"></div><span>${step}</span></div>`;
  }).join('');

  const pct = currentIdx < 0 ? 0 : Math.round((currentIdx / (AGENT_STEPS.length-1)) * 100);

  let html = `
    <div style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:4px;">
        <span><span class="status-pill pill-${s.status}">${s.status}</span></span>
        <span style="color:var(--muted)">${s.elapsed_s ? s.elapsed_s.toFixed(1)+'s' : ''}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="steps">${stepsHtml}</div>`;

  if (s.retry_count) html += `<p style="margin-top:10px;font-size:0.8rem;color:var(--warn)">⚠ Retry ${s.retry_count}</p>`;
  if (s.error) html += `<p style="margin-top:8px;font-size:0.8rem;color:var(--danger)">✗ ${s.error}</p>`;
  if (s.human_confirmation_needed) {
    html += `<div class="alert alert-warn" style="margin-top:10px;">👤 Human review needed<br/>
      <button style="margin-top:8px" onclick="confirmTask('${s.task_id}','proceed')">Proceed</button>
      <button class="btn-danger" style="margin-left:8px" onclick="confirmTask('${s.task_id}','abort')">Abort</button>
    </div>`;
  }

  document.getElementById('monitorArea').innerHTML = html;
}

async function viewTask(taskId) {
  document.getElementById('taskDetail').style.display = 'block';
  document.getElementById('detailId').textContent = taskId;
  document.getElementById('humanAlert').innerHTML = '';

  try {
    const r = await api(`/result/${taskId}`);
    document.getElementById('reportContent').textContent = r.report || '(no report yet)';
    document.getElementById('metricsContent').textContent = JSON.stringify({
      token_usage: r.token_usage, step_timings: r.step_timings, sources: r.sources
    }, null, 2);

    // Code from task store via status
    const s = await api(`/status/${taskId}`);
    if (s.human_confirmation_needed) {
      document.getElementById('humanAlert').innerHTML = `
        <div class="alert alert-warn">👤 Human review required<br/>${s.human_confirmation_message}<br/>
          <button style="margin-top:8px" onclick="confirmTask('${taskId}','proceed')">Proceed</button>
          <button class="btn-danger" style="margin-left:8px" onclick="confirmTask('${taskId}','abort')">Abort</button>
        </div>`;
    }

    const arts = r.artifacts || [];
    document.getElementById('artifactsContent').innerHTML = arts.length
      ? arts.map(a => `<div style="padding:8px 0; border-bottom:1px solid var(--border); font-size:0.85rem; font-family:monospace">${a}</div>`).join('')
      : '<div class="empty-state">No artifacts.</div>';

    document.getElementById('taskDetail').scrollIntoView({behavior:'smooth'});
  } catch(e) {
    document.getElementById('reportContent').textContent = 'Result not yet available. Task may still be running.';
  }
}

async function confirmTask(taskId, action) {
  await api(`/confirm/${taskId}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action})
  });
  startPolling(taskId);
  document.getElementById('humanAlert').innerHTML = '';
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['report','code','metrics','artifacts'][i]===name));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id===`tab-${name}`));
}

function loadExample() {
  document.getElementById('taskInput').value =
    'Analyse global renewable energy capacity trends from 2010-2023. Generate synthetic datasets, perform statistical analysis, create visualisations (line charts, bar charts, heatmaps), identify key growth patterns, and produce a comprehensive structured report with insights and recommendations.';
}

// Auto-refresh
checkHealth();
loadMetrics();
loadTasks();
setInterval(() => { checkHealth(); loadMetrics(); loadTasks(); }, 10000);
</script>
</body>
</html>
